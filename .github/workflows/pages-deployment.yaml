on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build:masters

      - name: Extract branch name
        id: extract_branch
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          slug="${branch//\//-}"
          echo "branch=${branch}" >> $GITHUB_OUTPUT
          echo "branch_slug=${slug}" >> $GITHUB_OUTPUT
          if [ "${branch}" = "main" ]; then
            echo "deploy_name=medi-xplorer" >> $GITHUB_OUTPUT
          else
            echo "deploy_name=medi-xplorer-${slug}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare with OpenNext
        if: github.repository == 'kohii/medi-xplorer'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # Use the npm script, not pnpm's built‑in "deploy" command (which expects a workspace)
        run: pnpm run deploy -- --name "${{ steps.extract_branch.outputs.deploy_name }}" --env "${{ steps.extract_branch.outputs.branch_slug }}"
