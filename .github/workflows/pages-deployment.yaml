on:
  push:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build:masters

      - name: Extract branch name
        id: extract_branch
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          slug="${branch//\//-}"
          echo "branch=${branch}" >> $GITHUB_OUTPUT
          echo "branch_slug=${slug}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare (production)
        if: github.repository == 'kohii/medi-xplorer' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm run deploy

      - name: Purge Cloudflare cache (production)
        if: github.repository == 'kohii/medi-xplorer' && github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/purge_result.json
          jq -e '.success == true' /tmp/purge_result.json

      - name: Deploy to Cloudflare (preview)
        if: github.repository == 'kohii/medi-xplorer' && github.ref != 'refs/heads/main'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Remove custom domain routes to avoid claiming medi-xplorer.com from preview deploys
          node -e "
            const fs = require('fs');
            let c = fs.readFileSync('wrangler.jsonc', 'utf8');
            c = c.replace(/,\s*\"routes\"[\s\S]*?\]/g, '');
            fs.writeFileSync('wrangler.jsonc', c);
          "
          pnpm run deploy -- --name "medi-xplorer-${{ steps.extract_branch.outputs.branch_slug }}"
